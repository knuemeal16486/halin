  <style>
  html, body { height: 100%; margin: 0; width: 100%; }
  * { font-family: 'Jua', sans-serif; }
  .gaegu { font-family: 'Gaegu', cursive; }

  /* Full screen scaling */
  #app { font-size: 18px; }

  /* Scale all text sizes */
  h1 { font-size: 3.5rem !important; }
  h2 { font-size: 2.5rem !important; }
  h3 { font-size: 2rem !important; }
  p, span, label, button { font-size: 1.25rem !important; }

  /* Scale buttons */
  button { padding: 1rem 1.5rem !important; }

  /* Scale cards */
  .game-card { padding: 1rem !important; min-width: 120px !important; }

  /* Scale modals */
  #learnModal { z-index: 50; }
  #learnModal .bg-white { padding: 2rem !important; max-width: 600px !important; }
  #learnModal svg { width: 120px !important; height: 120px !important; }

  /* Scale canvas */
  .draw-canvas { height: 500px !important; }

  /* Scale baskets */
  .basket { width: 200px !important; min-height: 180px !important; padding: 1.5rem !important; }
  .basket svg { width: 80px !important; height: 60px !important; }

  /* Classroom background */
  .classroom-bg {
    background: linear-gradient(180deg, #FFF8E7 0%, #FFEFD5 40%, #E8D5B7 100%);
    position: relative;
    overflow: hidden;
  }
  .classroom-bg::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(180deg, #B8E6C8 0%, #C5E8D3 50%, transparent 100%);
    opacity: 0.3;
    pointer-events: none;
  }

  /* Card styles */
  .game-card {
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .game-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
  .game-card.dragging { opacity: 0.6; transform: scale(0.95); cursor: grabbing; }

  /* Basket glow */
  .basket { transition: all 0.3s; border: 3px dashed transparent; }
  .basket.drag-over { border-color: #FFD700; background: rgba(255,215,0,0.1); transform: scale(1.05); }
  .basket.correct-flash { animation: correctPulse 0.6s ease; }
  .basket.wrong-flash { animation: wrongShake 0.5s ease; }

  @keyframes correctPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(72,187,120,0); }
    50% { box-shadow: 0 0 30px 10px rgba(72,187,120,0.4); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* Star burst */
  @keyframes starBurst {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }
  .star-particle {
    position: absolute; pointer-events: none;
    animation: starBurst 0.8s ease forwards;
  }

  /* Fade in */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeSlideUp 0.5s ease forwards; }
  .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

  /* Quiz option */
  .quiz-option {
    transition: all 0.2s;
    cursor: pointer;
  }
  .quiz-option:hover { transform: scale(1.03); }
  .quiz-option.selected { ring: 3px; }

  /* Drawing canvas */
  .draw-canvas { cursor: crosshair; border-radius: 12px; touch-action: none; }

  /* Floating decorations */
  @keyframes floatSlow {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }
  .float-deco { animation: floatSlow 4s ease-in-out infinite; position: absolute; pointer-events: none; opacity: 0.4; }

  /* Progress bar */
  .progress-fill { transition: width 0.5s ease; }

  /* Screen transitions */
  .screen { display: none; }
  .screen.active { display: flex; }

  /* Score popup */
  @keyframes scorePopup {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .score-popup { animation: scorePopup 0.5s ease forwards; }

  /* Tooltip on cards */
  .card-tooltip {
    position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 2px 8px; border-radius: 6px;
    font-size: 11px; white-space: nowrap; opacity: 0; transition: opacity 0.2s;
    pointer-events: none; z-index: 50;
  }
  .game-card:hover .card-tooltip { opacity: 1; }
</style>

function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const text = config.text_color || defaultConfig.text_color;
  const primary = config.primary_action_color || defaultConfig.primary_action_color;
  const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
  const font = config.font_family || 'Jua';
  const fontSize = config.font_size || 16;

  const app = document.getElementById('app');
  app.style.background = `linear-gradient(180deg, ${bg} 0%, ${adjustColor(bg, -10)} 100%)`;

  document.querySelectorAll('.bg-white, .bg-white\\/60').forEach(el => {
    if(!el.classList.contains('draw-canvas')) el.style.backgroundColor = surface;
  });

  const title = document.getElementById('titleText');
  const welcome = document.getElementById('welcomeText');
  if(title) {
    title.textContent = config.game_title || defaultConfig.game_title;
    title.style.color = text;
    title.style.fontFamily = `${font}, Jua, sans-serif`;
    title.style.fontSize = `${fontSize * 2}px`;
  }
  if(welcome) {
    welcome.textContent = config.welcome_message || defaultConfig.welcome_message;
    welcome.style.color = secondary;
    welcome.style.fontFamily = `${font}, Gaegu, cursive`;
    welcome.style.fontSize = `${fontSize * 1.1}px`;
  }

  const drawTitle = document.getElementById('drawScreenTitle');
  if(drawTitle) {
    drawTitle.textContent = config.draw_screen_name ? `🖌️ ${config.draw_screen_name}` : `🖌️ ${defaultConfig.draw_screen_name}`;
    drawTitle.style.color = text;
    drawTitle.style.fontFamily = `${font}, Jua, sans-serif`;
    drawTitle.style.fontSize = `${fontSize * 1.4}px`;
  }

  document.querySelectorAll('h2').forEach(h => {
    h.style.color = text;
    h.style.fontFamily = `${font}, Jua, sans-serif`;
    h.style.fontSize = `${fontSize * 1.4}px`;
  });
  document.querySelectorAll('p, span, label').forEach(el => {
    if(!el.closest('button')) el.style.fontFamily = `${font}, Gaegu, cursive`;
  });
  document.querySelectorAll('button').forEach(b => {
    b.style.fontFamily = `${font}, Jua, sans-serif`;
    b.style.fontSize = `${fontSize * 0.9}px`;
  });

  document.getElementById('scoreDisplay').style.backgroundColor = hexToRgba(primary, 0.2);
  document.getElementById('scoreDisplay').style.color = text;
}

function adjustColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function startSort() {
  showScreen('Sort');

  sortBasketCounts = { elements: 0, principles: 0 };
  const shuffled = [...ALL_ITEMS].sort(() => Math.random() - 0.5).slice(0, 8);
  sortCards = shuffled;
  sortTotal = shuffled.length;
  renderSortCards();
  updateSortCounts();
  document.getElementById('sortFeedback').textContent = '';
  updateProgress(0);
}

function renderSortCards() {
  const area = document.getElementById('sortCardsArea');
  area.innerHTML = '';
  sortCards.forEach(item => {
    const card = document.createElement('div');
    card.className = 'game-card bg-white rounded-xl shadow-md p-2 text-center w-20 relative';
    card.draggable = true;
    card.dataset.id = item.id;
    card.dataset.type = item.type;
    card.innerHTML = `
      <div class="text-2xl mb-1">${item.emoji}</div>
      <div class="text-xs font-bold text-amber-900">${item.name}</div>
      <div class="card-tooltip">${item.type === 'elements' ? '조형 요소' : '조형 원리'}</div>
    `;
    card.addEventListener('dragstart', handleDragStart);
    card.addEventListener('dragend', handleDragEnd);
    // Touch support
    card.addEventListener('touchstart', handleTouchStart, {passive:false});
    card.addEventListener('touchmove', handleTouchMove, {passive:false});
    card.addEventListener('touchend', handleTouchEnd);
    area.appendChild(card);
  });
}

let draggedItem = null;
function handleDragStart(e) {
  draggedItem = { id: e.target.dataset.id, type: e.target.dataset.type };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragEnd(e) { e.target.classList.remove('dragging'); }
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function handleDrop(e, basketType) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedItem) return;
  checkSortAnswer(draggedItem.id, draggedItem.type, basketType, e.currentTarget);
  draggedItem = null;
}

// Touch drag support
let touchDragEl = null;
let touchDragData = null;
function handleTouchStart(e) {
  e.preventDefault();
  touchDragEl = e.target.closest('.game-card');
  touchDragData = { id: touchDragEl.dataset.id, type: touchDragEl.dataset.type };
  touchDragEl.classList.add('dragging');
}
function handleTouchMove(e) {
  e.preventDefault();
  if (!touchDragEl) return;
  const touch = e.touches[0];
  touchDragEl.style.position = 'fixed';
  touchDragEl.style.left = (touch.clientX - 40) + 'px';
  touchDragEl.style.top = (touch.clientY - 30) + 'px';
  touchDragEl.style.zIndex = '100';
  // Highlight baskets
  ['basketElements','basketPrinciples'].forEach(id => {
    const b = document.getElementById(id);
    const rect = b.getBoundingClientRect();
    if (touch.clientX >= rect.left && touch.clientX <= rect.right && touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      b.classList.add('drag-over');
    } else {
      b.classList.remove('drag-over');
    }
  });
}
function handleTouchEnd(e) {
  if (!touchDragEl || !touchDragData) return;
  touchDragEl.classList.remove('dragging');
  touchDragEl.style.position = ''; touchDragEl.style.left = ''; touchDragEl.style.top = ''; touchDragEl.style.zIndex = '';
  const touch = e.changedTouches[0];
  let dropped = false;
  [['basketElements','elements'],['basketPrinciples','principles']].forEach(([id, type]) => {
    const b = document.getElementById(id);
    b.classList.remove('drag-over');
    const rect = b.getBoundingClientRect();
    if (touch.clientX >= rect.left && touch.clientX <= rect.right && touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
      checkSortAnswer(touchDragData.id, touchDragData.type, type, b);
      dropped = true;
    }
  });
  touchDragEl = null;
  touchDragData = null;
}

function checkSortAnswer(itemId, itemType, basketType, basketEl) {
  const fb = document.getElementById('sortFeedback');
  if (itemType === basketType) {
    sortCorrect++;
    sortBasketCounts[basketType]++;
    updateScore(10);
    basketEl.classList.add('correct-flash');
    setTimeout(() => basketEl.classList.remove('correct-flash'), 600);
    fb.innerHTML = '<span class="text-green-600">✅ 정답이에요! 잘했어요!</span>';
    spawnStars(basketEl);
    // Remove card
    sortCards = sortCards.filter(c => c.id !== itemId);
    renderSortCards();
    updateSortCounts();
    updateProgress(((sortTotal - sortCards.length) / sortTotal) * 100);
    if (sortCards.length === 0) {
      setTimeout(() => showResults('sort'), 800);
    }
  } else {
    basketEl.classList.add('wrong-flash');
    setTimeout(() => basketEl.classList.remove('wrong-flash'), 500);
    fb.innerHTML = '<span class="text-red-500">❌ 다시 생각해 볼까요?</span>';
  }
}

function updateSortCounts() {
  document.getElementById('basketElementsCount').textContent = `${sortBasketCounts.elements}개`;
  document.getElementById('basketPrinciplesCount').textContent = `${sortBasketCounts.principles}개`;
}

function spawnStars(target) {
  const rect = target.getBoundingClientRect();
  for (let i = 0; i < 6; i++) {
    const star = document.createElement('div');
    star.className = 'star-particle';
    star.textContent = ['⭐','✨','🌟'][Math.floor(Math.random() * 3)];
    star.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
    star.style.top = (rect.top + (Math.random()-0.5)*40) + 'px';
    star.style.fontSize = (14 + Math.random()*12) + 'px';
    star.style.animationDelay = (Math.random() * 0.3) + 's';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 1200);

}

// ===== QUIZ =====
function startQuiz() {
  showScreen('Quiz');
  quizIndex = 0;
  quizAnswered = false;
  // Generate 5 random questions
  quizQuestions = generateQuizQuestions(5);
  showQuizQuestion();
}

function generateQuizQuestions(count) {
  const questions = [];
  const items = [...ALL_ITEMS].sort(() => Math.random() - 0.5);
  for (let i = 0; i < Math.min(count, items.length); i++) {
    const item = items[i];
    const qTypes = [
      {
        q: `이 설명에 해당하는 조형 개념은? "${item.desc.slice(0, 30)}..."`,
        correct: item.name,
        icon: '🤔'
      },
      {
        q: `'${item.name}'은(는) 조형 요소와 조형 원리 중 어디에 속할까요?`,
        correct: item.type === 'elements' ? '조형 요소' : '조형 원리',
        icon: item.emoji,
        options: ['조형 요소', '조형 원리']
      }
    ];
    const qt = qTypes[Math.floor(Math.random() * qTypes.length)];
    if (!qt.options) {
      // Generate wrong answers
      const others = ALL_ITEMS.filter(x => x.id !== item.id).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.name);
      qt.options = [qt.correct, ...others].sort(() => Math.random() - 0.5);
    }
    questions.push(qt);
  }
  return questions;
}

function showQuizQuestion() {
  if (quizIndex >= quizQuestions.length) {
    showResults('quiz');
    return;
  }
  quizAnswered = false;
  const q = quizQuestions[quizIndex];
  document.getElementById('quizProgress').textContent = `문제 ${quizIndex + 1} / ${quizQuestions.length}`;
  document.getElementById('quizIcon').textContent = q.icon;
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('quizFeedback').textContent = '';
  updateProgress(((quizIndex) / quizQuestions.length) * 100);

  const optContainer = document.getElementById('quizOptions');
  optContainer.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option w-full py-3 px-4 rounded-xl border-2 border-amber-200 bg-amber-50 text-amber-900 font-bold text-left';
    btn.textContent = opt;
    btn.onclick = () => answerQuiz(opt, q.correct, btn);
    optContainer.appendChild(btn);
  });
}

function answerQuiz(selected, correct, btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const fb = document.getElementById('quizFeedback');
  const allBtns = document.querySelectorAll('.quiz-option');

  allBtns.forEach(b => {
    if (b.textContent === correct) {
      b.style.borderColor = '#48BB78';
      b.style.backgroundColor = '#F0FFF4';
    }
  });

  if (selected === correct) {
    btn.style.borderColor = '#48BB78';
    btn.style.backgroundColor = '#F0FFF4';
    fb.innerHTML = '<span class="text-green-600">🎉 정답이에요!</span>';
    updateScore(20);
    spawnStars(btn);
  } else {
    btn.style.borderColor = '#FC8181';
    btn.style.backgroundColor = '#FFF5F5';
    fb.innerHTML = `<span class="text-red-500">아쉬워요! 정답은 <b>${correct}</b>이에요.</span>`;
  }

  setTimeout(() => {
    quizIndex++;
    showQuizQuestion();
  }, 1500);
}

let drawCtx, isDrawing = false, isEraser = false, currentColor = '#333333';
let drawMode = 'normal'; // 'normal', 'dot', 'line', 'plane'
let currentPrinciple = null;
let lastX = 0, lastY = 0;
const PALETTE_COLORS = ['#333333','#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#9B59B6','#FF9FF3','#FF9800','#FFFFFF'];

function startDraw() {
  showScreen('Draw');
  // Pick random principle
  const randomPrinciple = PRINCIPLES[Math.floor(Math.random() * PRINCIPLES.length)];
  currentPrinciple = randomPrinciple;
  document.getElementById('principleDisplay').innerHTML = `
    <div class="text-xl font-bold text-purple-600">오늘의 조형 원리</div>
    <div class="text-center">${randomPrinciple.svg}</div>
    <div class="text-lg font-bold text-purple-800">${randomPrinciple.name}</div>
    <div class="text-xs text-purple-700 gaegu font-bold">${randomPrinciple.desc}</div>
  `;
  setupCanvas();
  setupPalette();
  setupDrawModeButtons();
}

function setupDrawModeButtons() {
  const container = document.getElementById('drawModeButtons');
  container.innerHTML = '';
  [
    {mode:'normal', label:'자유 그리기', icon:'🖌️'},
    {mode:'dot', label:'점', icon:'⚫'},
    {mode:'line', label:'선', icon:'〰️'},
    {mode:'plane', label:'면', icon:'⬜'}
  ].forEach(btn => {
    const button = document.createElement('button');
    button.className = `px-3 py-2 rounded-lg text-xs font-bold transition-all ${drawMode === btn.mode
      ? 'bg-purple-500 text-white'
      : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`;
    button.textContent = `${btn.icon} ${btn.label}`;
    button.onclick = () => {
      drawMode = btn.mode;
      setupDrawModeButtons();
    };
    container.appendChild(button);
  });
}

function setupCanvas() {
  const canvas = document.getElementById('drawCanvas');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 700;
  canvas.style.height = '350px';
  drawCtx = canvas.getContext('2d');
  drawCtx.fillStyle = '#FFFFFF';
  drawCtx.fillRect(0, 0, canvas.width, canvas.height);
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';

  canvas.onmousedown = (e) => { isDrawing = true; const rect = canvas.getBoundingClientRect(); lastX = (e.clientX - rect.left) * (canvas.width / rect.width); lastY = (e.clientY - rect.top) * (canvas.height / rect.height); draw(e); };
  canvas.onmousemove = (e) => { if (isDrawing) draw(e); };
  canvas.onmouseup = () => { isDrawing = false; drawCtx.beginPath(); };
  canvas.onmouseleave = () => { isDrawing = false; drawCtx.beginPath(); };

  canvas.ontouchstart = (e) => { e.preventDefault(); isDrawing = true; const rect = canvas.getBoundingClientRect(); const touch = e.touches[0]; lastX = (touch.clientX - rect.left) * (canvas.width / rect.width); lastY = (touch.clientY - rect.top) * (canvas.height / rect.height); drawTouch(e); };
  canvas.ontouchmove = (e) => { e.preventDefault(); if (isDrawing) drawTouch(e); };
  canvas.ontouchend = () => { isDrawing = false; drawCtx.beginPath(); };
}

function draw(e) {
  const canvas = document.getElementById('drawCanvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const size = parseInt(document.getElementById('brushSize').value);

  drawCtx.strokeStyle = isEraser ? '#FFFFFF' : currentColor;
  drawCtx.fillStyle = isEraser ? '#FFFFFF' : currentColor;

  if (drawMode === 'dot') {
    drawCtx.beginPath();
    drawCtx.arc(x, y, size * 1.5, 0, Math.PI * 2);
    drawCtx.fill();
  } else if (drawMode === 'line') {
    drawCtx.lineWidth = size * 2;
    if (lastX === 0 && lastY === 0) {
      drawCtx.moveTo(x, y);
    } else {
      drawCtx.beginPath();
      drawCtx.moveTo(lastX, lastY);
      drawCtx.lineTo(x, y);
      drawCtx.stroke();
    }
    lastX = x;
    lastY = y;
  } else if (drawMode === 'plane') {
    const squareSize = size * 3;
    drawCtx.fillRect(x - squareSize / 2, y - squareSize / 2, squareSize, squareSize);
  } else {
    drawCtx.lineWidth = size * 2;
    if (lastX === 0 && lastY === 0) {
      drawCtx.moveTo(x, y);
    } else {
      drawCtx.beginPath();
      drawCtx.moveTo(lastX, lastY);
      drawCtx.lineTo(x, y);
      drawCtx.stroke();
    }
    lastX = x;
    lastY = y;
  }
}

function drawTouch(e) {
  const touch = e.touches[0];

  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (touch.clientX - rect.left) * scaleX;

  const size = parseInt(document.getElementById('brushSize').value);

  drawCtx.strokeStyle = isEraser ? '#FFFFFF' : currentColor;
  drawCtx.fillStyle = isEraser ? '#FFFFFF' : currentColor;

  if (drawMode === 'dot') {

    drawCtx.fill();
  } else if (drawMode === 'line') {
    drawCtx.lineWidth = size * 2;
    if (lastX === 0 && lastY === 0) {
      drawCtx.moveTo(x, y);
    } else {
      drawCtx.beginPath();
      drawCtx.moveTo(lastX, lastY);
      drawCtx.lineTo(x, y);
      drawCtx.stroke();
    }
    lastX = x;
    lastY = y;
  } else if (drawMode === 'plane') {
    const squareSize = size * 3;
    drawCtx.fillRect(x - squareSize / 2, y - squareSize / 2, squareSize, squareSize);
  } else {
    drawCtx.lineWidth = size * 2;
    if (lastX === 0 && lastY === 0) {
      drawCtx.moveTo(x, y);
    } else {
      drawCtx.beginPath();
      drawCtx.moveTo(lastX, lastY);
      drawCtx.lineTo(x, y);
      drawCtx.stroke();
    }
    lastX = x;
    lastY = y;
  }
}

function setupPalette() {
  const container = document.getElementById('colorPalette');
  container.innerHTML = '';
  PALETTE_COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'w-6 h-6 rounded-full border-2 transition-all hover:scale-110';
    btn.style.backgroundColor = c;
    btn.style.borderColor = c === currentColor && !isEraser ? '#333' : '#ddd';
    btn.onclick = () => {
      currentColor = c;
      isEraser = false;
      document.getElementById('eraserBtn').classList.remove('bg-amber-400', 'text-white');
      document.getElementById('eraserBtn').classList.add('bg-gray-200');
      setupPalette();
    };
    if (c === currentColor && !isEraser) btn.style.transform = 'scale(1.2)';
    container.appendChild(btn);
  });
}

function toggleEraser() {
  isEraser = !isEraser;
  const btn = document.getElementById('eraserBtn');
  if (isEraser) {
    btn.classList.remove('bg-gray-200');
    btn.classList.add('bg-amber-400', 'text-white');
  } else {
    btn.classList.remove('bg-amber-400', 'text-white');
    btn.classList.add('bg-gray-200');
    currentColor = '#333333';
  }
  setupPalette();
}

function clearCanvas() {
  const canvas = document.getElementById('drawCanvas');
  drawCtx.fillStyle = '#FFFFFF';
  drawCtx.fillRect(0, 0, canvas.width, canvas.height);
}
